#   push:
#     branches: ['main', 'feats/add-ci-cd-pipeline']

jobs:
  build-deploy:
    name: Build and Deploy that Spring Boot project
    runs-on: ubuntu-latest
    env:
      BACKEND_DIR: ./backend
      BACKEND_DOCKERFILE: ./backend/Dockerfile
      POM_FILE: ./backend/pom.xml
    steps:
      - name: Get current date and time
        id: datetime
        run: echo "::set-output name=date::$(date +'%Y.%m.%d-%H.%M.%S')"

      - name: Set Docker image tag
        run: echo "IMAGE_TAG=v${{ steps.datetime.outputs.date }}" >> $GITHUB_ENV

      - name: Checkout to project code
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'

      - name: Unit tests
        run: mvn -B test --file ${{env.POM_FILE}}

      - name: Build the application
        run: |
          cd backend
          mvn clean
          mvn -B package --file pom.xml

      - name: Deploy to Fly.io
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy backend
        run: fly deploy --remote-only
        working-directory: backend
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}